services:
  - type: web
    name: interviewiq-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MODEL_NAME
        value: openrouter/free
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/prepzona.db
      - key: AUDIO_DIR
        value: /tmp/audio
      - key: RECORDINGS_DIR
        value: /tmp/recordings
      - key: APP_BASE_URL
        value: https://interviewiq-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://interviewiq-frontend.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.7

  - type: web
    name: interviewiq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://interviewiq-api.onrender.com
      - key: NODE_VERSION
        value: 22.12.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
