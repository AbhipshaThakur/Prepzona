services:
  - type: web
    name: interviewiq-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MODEL_NAME
        value: openrouter/free
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/prepzona.db
      - key: AUDIO_DIR
        value: /var/data/audio
      - key: RECORDINGS_DIR
        value: /var/data/recordings
      - key: APP_BASE_URL
        value: https://interviewiq-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://interviewiq-frontend.onrender.com
    disks:
      - name: interviewiq-data
        mountPath: /var/data
        sizeGB: 1

  - type: static_site
    name: interviewiq-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://interviewiq-api.onrender.com
